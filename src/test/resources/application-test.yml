datasources:
  h2:
    url: jdbc:h2:mem:db-${random.uuid};TIME ZONE=UTC;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driverClassName: org.h2.Driver

kestra:
  queue:
    type: h2
  repository:
    type: h2
  storage:
    type: gcs
    gcs:
      bucket: "kestra-unit-test"
  server:
    liveness:
      enabled: false
    termination-grace-period: 5s
  grpc:
    maxRetryAttempts: 1
    shutdownTimeout: 3s
  controller:
    port: ${random.port}
  worker:
    controllers:
      type: STATIC
      static:
        endpoints:
          - host: localhost
            port: ${kestra.controller.port}

grpc:
  server:
    enabled: false
    health:
      enabled: false
